scrape_configs:
  - job_name: "keycloak"
    static_configs:
      - targets: ["bts-auth.su.bath.ac.uk"]
        labels:
          app: "keycloak"
    scheme: 'https'
    metrics_path: '/realms/bts-prod/metrics'
  - job_name: "keycloak:cloud"
    static_configs:
      - targets: ["keycloak.aws.internal.bts-crew.com:8080"]
        labels:
          app: "keycloak"
    scheme: 'http'
    metrics_path: '/realms/prod/metrics'
