scrape_configs:
 - job_name: "varsity26:snmp"

   static_configs:
     - targets: ["control-switch.varsity26.internal.bts-crew.com", "infield-switch.varsity26.internal.bts-crew.com", "fanzone-switch.internal.bts-crew.com"]
   metrics_path: /snmp
   params:
     auth: [public_v2]
     module: [if_mib]
   relabel_configs:
     - source_labels: [__address__]
       target_label: __param_target
     - source_labels: [__param_target]
       target_label: instance
     - target_label: __address__
       replacement: 127.0.0.1:9116